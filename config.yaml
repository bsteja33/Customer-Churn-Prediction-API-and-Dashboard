# ============================================================
# Customer Churn Prediction — Central Configuration File
# ============================================================

data:
  raw_path: "data/telecom_customer_churn.csv"
  drop_columns:
    - "Customer ID"
    - "City"
    - "Zip Code"
    - "Latitude"
    - "Longitude"
    - "Churn Category"
    - "Churn Reason"
  target_column: "Customer Status"
  positive_class: "Churned"
  negative_class: "Stayed"

model:
  save_path: "models/churn_model.pkl"
  random_state: 42
  test_size: 0.20
  cv_folds: 5

tuning:
  n_iter: 30
  scoring: "roc_auc"
  param_grid:
    classifier__max_iter: [100, 200, 300]
    classifier__max_depth: [3, 5, 7, null]
    classifier__learning_rate: [0.01, 0.05, 0.1]
    classifier__l2_regularization: [0.0, 0.1, 1.0]

api:
  host: "0.0.0.0"
  port: 8000
  title: "Customer Churn Prediction API"
  description: "FastAPI service for predicting telecom customer churn probability."
  version: "1.0.0"
