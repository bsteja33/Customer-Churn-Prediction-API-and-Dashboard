
data:
  raw_path: null
  dataset: "aai510-group1/telco-customer-churn"
  max_samples: 50000
  drop_columns:
    - "Customer ID"
    - "Churn Category"
    - "Churn Reason"
    - "Churn Score"
    - "Customer Status"
    - "City"
    - "Country"
    - "Lat Long"
    - "Latitude"
    - "Longitude"
    - "State"
    - "Zip Code"
    - "Quarter"
    - "Population"
  target_column: "Churn"
  positive_class: 1
  negative_class: 0

model:
  save_path: "models/churn_model.pkl"
  random_state: 42
  test_size: 0.20

lightgbm:
  objective: "binary"
  metric: "auc"
  boosting_type: "gbdt"
  max_depth: 5
  learning_rate: 0.05
  n_estimators: 300
  num_leaves: 31
  reg_lambda: 0.1
  class_weight: "balanced"
  verbosity: -1

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "churn_prediction_polars"
