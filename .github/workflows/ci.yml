name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Backend Presence
        id: check_files
        run: |
          if [ -d "api" ] && [ -d "src" ]; then
            echo "run_backend=true" >> $GITHUB_OUTPUT
          else
            echo "run_backend=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_files.outputs.run_backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        if: steps.check_files.outputs.run_backend == 'true'
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python Dependencies
        if: steps.check_files.outputs.run_backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Backend
        if: steps.check_files.outputs.run_backend == 'true'
        run: flake8 api/ src/ --count --max-line-length=120 --statistics

      - name: Install Dev Dependencies
        if: steps.check_files.outputs.run_backend == 'true'
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run Backend Tests with Coverage
        if: steps.check_files.outputs.run_backend == 'true'
        run: python -m pytest tests/ -vv --cov=api --cov=src --cov-report=term --cov-fail-under=80

  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Frontend Presence
        id: check_files
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "run_frontend=true" >> $GITHUB_OUTPUT
          else
            echo "run_frontend=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check_files.outputs.run_frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache .next cache
        if: steps.check_files.outputs.run_frontend == 'true'
        uses: actions/cache@v4
        id: next-cache
        with:
          path: frontend/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            next-${{ runner.os }}-

      - name: Install Frontend Dependencies
        if: steps.check_files.outputs.run_frontend == 'true'
        run: cd frontend && npm ci

      - name: Lint Frontend
        if: steps.check_files.outputs.run_frontend == 'true'
        run: cd frontend && npm run lint

      - name: Run Frontend Tests
        if: steps.check_files.outputs.run_frontend == 'true'
        run: cd frontend && npm test

      - name: Run npm audit
        if: steps.check_files.outputs.run_frontend == 'true'
        run: cd frontend && npm audit --audit-level=high

      - name: Build Frontend
        if: steps.check_files.outputs.run_frontend == 'true'
        run: cd frontend && npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        id: pip-cache-sast
        with:
          path: ~/.cache/pip
          key: pip-sast-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-sast-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Run Bandit SAST
        run: bandit -r api/ src/ -lll

  load-test:
    runs-on: ubuntu-latest
    needs: [backend-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        id: pip-cache-2
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Boot Server & Run Load Test
        run: |
          nohup uvicorn api.app:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          sleep 5
          locust -f load_tests/locustfile.py --headless -u 50 -r 10 -t 15s --host http://localhost:8000
